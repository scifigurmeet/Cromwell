name: CodeGraph — Feature Impact on PRs

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  codegraph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build knowledge graph
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python codegraph.py build . --llm
          else
            python codegraph.py build .
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # On push: commit updated graph
      - name: Commit graph
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add codegraph.json REPO_CONTEXT.md
          git diff --cached --quiet || git commit -m "chore: update code knowledge graph [skip ci]"
          git push

      # On PR: analyze changed files and comment
      - name: Analyze PR impact
        if: github.event_name == 'pull_request'
        run: |
          echo "## 🔍 Feature Impact Analysis" > pr_comment.md
          echo "" >> pr_comment.md
          echo "Changes in this PR affect the following features:" >> pr_comment.md
          echo "" >> pr_comment.md

          # Query each changed file
          git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD | while read file; do
            result=$(python codegraph.py query "$file" --graph codegraph.json 2>/dev/null || echo '{}')
            features=$(echo "$result" | python3 -c "import sys,json; d=json.load(sys.stdin); print(', '.join(d.get('features',['Unknown'])))" 2>/dev/null || echo "Unknown")
            blast_count=$(echo "$result" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('blast_radius',{}).get('affected_files',[])))" 2>/dev/null || echo "?")
            echo "- \`$file\` → **$features** (blast radius: $blast_count files)" >> pr_comment.md
          done

          echo "" >> pr_comment.md
          echo "---" >> pr_comment.md
          echo "*Generated by codegraph*" >> pr_comment.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr_comment.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
